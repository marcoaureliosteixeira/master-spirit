<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#060a16">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>MASTER SPIRIT — Meus Estudos</title>
<link rel="icon" type="image/x-icon" href="favicon.ico">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--gold:#C9A84C;--gold2:#E8C97A;--bg:#060a16;--text:#F5EFE0;--card-bg:rgba(255,255,255,.06);--card-border:rgba(201,168,76,.2)}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:auto}
body{background:var(--bg);color:var(--text);font-family:'Cinzel',Georgia,serif;font-size:16px}
p,span{font-family:Georgia,'Times New Roman',serif}
#page{max-width:900px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}
#hdr{background:rgba(12,18,38,.88);-webkit-backdrop-filter:blur(16px);backdrop-filter:blur(16px);border-bottom:1px solid rgba(201,168,76,.12);padding:14px 18px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:50}
#hdr h1{font-family:'Cinzel',serif;font-size:14px;color:var(--gold);letter-spacing:2px}
#hdr p{font-size:11px;font-style:italic;color:rgba(240,234,214,.35);margin-top:2px;font-family:Georgia,serif}
#stars{position:fixed;inset:0;pointer-events:none;z-index:0;max-width:900px;margin:0 auto}
.star{position:absolute;background:white;border-radius:50%;animation:tw var(--d,3s) ease-in-out infinite var(--dl,0s)}
@keyframes tw{0%,100%{opacity:.05}50%{opacity:.65}}
#nav-menu{display:none;background:rgba(12,18,38,.95);border-bottom:1px solid rgba(201,168,76,.15);padding:10px 18px;box-shadow:0 4px 12px rgba(0,0,0,.3)}
#nav-menu a{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid rgba(201,168,76,.08);text-decoration:none;color:var(--text);font-size:15px;font-family:'Cinzel',serif}
#nav-menu a:last-child{border-bottom:none}
#main{flex:1;padding:18px}
/* Stats */
.stats-row{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap}
.stat-card{flex:1;min-width:80px;background:var(--card-bg);border:1px solid var(--card-border);border-radius:12px;padding:14px 10px;text-align:center}
.stat-val{font-family:'Cinzel',serif;font-size:22px;color:var(--gold);margin-bottom:2px}
.stat-lbl{font-size:9px;color:rgba(240,234,214,.4);letter-spacing:1px;text-transform:uppercase;font-family:'Cinzel',serif}
/* Study cards */
.study-card{background:var(--card-bg);border:1px solid var(--card-border);border-radius:14px;padding:16px;margin-bottom:12px;cursor:pointer;transition:all .2s}
.study-card:hover{border-color:var(--gold);transform:translateY(-1px)}
.study-top{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.study-top img{width:48px;height:48px;border-radius:50%;object-fit:cover;border:2px solid rgba(201,168,76,.3);transition:transform .3s ease,box-shadow .3s ease;cursor:pointer}
.study-top img:hover{transform:scale(1.6);z-index:20;position:relative;box-shadow:0 0 30px rgba(201,168,76,.5)}
.study-name{font-family:'Cinzel',serif;font-size:12px;color:var(--gold);letter-spacing:.5px}
.study-ref{font-size:11px;color:rgba(240,234,214,.35);font-style:italic;font-family:Georgia,serif;margin-top:2px}
.study-meta{display:flex;gap:12px;font-size:11px;color:rgba(240,234,214,.45);font-family:Georgia,serif;margin-bottom:8px;flex-wrap:wrap}
.study-meta span{display:flex;align-items:center;gap:4px}
.progress-bar{background:rgba(255,255,255,.07);border-radius:20px;height:8px;overflow:hidden}
.progress-fill{background:linear-gradient(90deg,#C9A84C,#E8C97A);height:100%;border-radius:20px;transition:width .5s}
.progress-text{font-size:10px;color:rgba(201,168,76,.5);font-family:'Cinzel',serif;letter-spacing:1px;margin-top:4px;text-align:right}
/* Empty */
.empty{text-align:center;padding:60px 20px}
.empty p{color:rgba(240,234,214,.3);font-family:Georgia,serif}
/* Footer */
#ft{text-align:center;padding:16px;border-top:1px solid rgba(201,168,76,.1)}
/* Avatar zoom */
#avatar-zoom{position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,.85);display:none;align-items:center;justify-content:center;cursor:pointer}
#avatar-zoom img{max-width:70vw;max-height:70vh;border-radius:50%;border:3px solid rgba(201,168,76,.5);box-shadow:0 0 60px rgba(201,168,76,.3)}
</style>
</head>
<body>
<div id="stars"></div>
<div id="avatar-zoom" onclick="this.style.display='none'"><img id="avatar-zoom-img" src="" alt=""></div>

<div id="page">
  <div id="hdr">
    <button onclick="history.back()" style="background:none;border:none;cursor:pointer;color:var(--gold);font-size:22px;padding:0">‹</button>
    <img src="avatar-mestre-emmanuel.png" style="width:40px;height:40px;border-radius:50%;object-fit:cover;border:2px solid rgba(201,168,76,.3)" alt="">
    <div style="flex:1">
      <h1>MEUS ESTUDOS</h1>
      <p>Acompanhe seu progresso</p>
    </div>
    <a href="app.html" onclick="sessionStorage.removeItem('spirit_splash_seen')" style="border:1px solid var(--card-border);border-radius:10px;padding:8px 10px;font-size:14px;color:var(--gold);text-decoration:none" title="Menu Principal"><img src="home-icone.png" style="height:22px;opacity:.8" alt="Home"></a>
  </div>

  <div id="main">
    <!-- Stats -->
    <div class="stats-row" id="stats-row">
      <div class="stat-card"><div class="stat-val" id="stat-total">0</div><div class="stat-lbl">Estudos</div></div>
      <div class="stat-card"><div class="stat-val" id="stat-sessions">0</div><div class="stat-lbl">Sessões</div></div>
      <div class="stat-card"><div class="stat-val" id="stat-pct">0%</div><div class="stat-lbl">Progresso</div></div>
      <div class="stat-card"><div class="stat-val" id="stat-streak">0</div><div class="stat-lbl">🔥 Streak</div></div>
    </div>

    <!-- Study list -->
    <div id="study-list"></div>

    <!-- Empty state -->
    <div class="empty" id="empty-state" style="display:none">
      <p style="font-size:32px;margin-bottom:12px">📖</p>
      <p style="font-size:14px;margin-bottom:8px">Nenhum estudo em andamento</p>
      <p style="font-size:13px;font-style:italic">Vá para <a href="salas.html" style="color:var(--gold);text-decoration:underline">Salas de Estudo</a> e escolha um tema com o Mestre Emmanuel.</p>
    </div>
  </div>

  <div id="ft">
    <div style="display:flex;align-items:center;gap:8px;justify-content:center">
      <span style="font-family:'Cinzel',serif;font-size:8px;letter-spacing:2px;color:rgba(240,234,214,.35);text-transform:uppercase">Powered by</span>
      <img src="logo-spyrit-systems.png" style="height:28px;opacity:.85" alt="Spyrit Systems">
    </div>
  </div>
</div>

<script>
var myStudies=[];
var avatars={
  antonio:'avatar-mestre-antonio.png',adriano:'avatar-mestre-adriano.png',
  leila:'avatar-mestre-leila.png',silvestre:'avatar-mestre-silvestre.png',
  wander:'avatar-mestre-wander.png',bia:'avatar-mestra-bia.png',
  swami:'avatar-mestre-especialista-swami.png',mary:'avatar-mestra-mary.png',
  mark:'avatar-mestre-especialista-mark.png',joao:'avatar-mestre-joao.png',
  emmanuel:'avatar-mestre-emmanuel.png'
};

// Load from localStorage (fallback) + Supabase
(async function(){
  try{myStudies=JSON.parse(localStorage.getItem('spirit_my_studies')||'[]');}catch(e){}
  if(window.supabase){
    try{
      var sb=window.supabase.createClient(
        'https://jwdvbtujzvqvktzxycwj.supabase.co',
        'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp3ZHZidHVqenZxdmt0enh5Y3dqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1Mjc2NDksImV4cCI6MjA4OTEwMzY0OX0.ZfkRgdYcTjYF_E4qr1_1CZMtSiCvKLeUsoRSLoO16Mw'
      );
      var sess=await sb.auth.getSession();
      if(sess.data?.session){
        var r=await fetch('/api/studies',{method:'POST',
          headers:{'Content-Type':'application/json','Authorization':'Bearer '+sess.data.session.access_token},
          body:JSON.stringify({action:'list'})});
        var d=await r.json();
        if(d.studies&&d.studies.length>0){
          myStudies=d.studies;
          // Sincronizar com localStorage
          localStorage.setItem('spirit_my_studies',JSON.stringify(myStudies));
        }
      }
    }catch(e){}
  }
  render();
})();

function render(){
  if(myStudies.length===0){
    document.getElementById('empty-state').style.display='block';
    document.getElementById('study-list').innerHTML='';
    return;
  }
  document.getElementById('empty-state').style.display='none';

  // Stats
  var totalSessions=0,totalCompleted=0;
  myStudies.forEach(function(s){
    totalCompleted+=(s.completedSessions||s.completed_sessions||0);
    totalSessions+=(s.totalSessions||s.total_sessions||16);
  });
  document.getElementById('stat-total').textContent=myStudies.length;
  document.getElementById('stat-sessions').textContent=totalCompleted;
  document.getElementById('stat-pct').textContent=totalSessions>0?Math.round(totalCompleted/totalSessions*100)+'%':'0%';

  // Study cards
  document.getElementById('study-list').innerHTML=myStudies.map(function(s,i){
    var completed=s.completedSessions||s.completed_sessions||0;
    var total=s.totalSessions||s.total_sessions||16;
    var pct=Math.round(completed/total*100);
    var facId=s.facilitador||'emmanuel';
    var facAvatar=avatars[facId]||'avatar-mestre-emmanuel.png';
    var mode=s.mode==='agendado'?'📅 Agendado':'🕊️ Livre';
    var startDate=s.startDate||s.started_at||s.createdAt||s.created_at;
    var started=startDate?new Date(startDate).toLocaleDateString('pt-BR'):'—';

    // Calcular projeção temporal
    var startObj=startDate?new Date(startDate):new Date();
    var daysPerSession=3.5; // média: 2 sessões por semana
    var sched=s.schedule||{};
    if(sched.days&&sched.days.length>0) daysPerSession=7/sched.days.length;
    var remainingSessions=total-completed;
    var daysRemaining=Math.ceil(remainingSessions*daysPerSession);
    var endDate=new Date();endDate.setDate(endDate.getDate()+daysRemaining);
    var endStr=endDate.toLocaleDateString('pt-BR',{day:'2-digit',month:'short'});
    var schedText=sched.days&&sched.days.length>0?sched.days.join(', ')+' às '+(sched.time||'19:30'):'No seu ritmo';

    // Timeline dots
    var dots='';
    for(var d=0;d<total;d++){
      var dotColor=d<completed?'rgba(91,175,124,.8)':d===completed?'var(--gold)':'rgba(255,255,255,.12)';
      var dotBorder=d===completed?'2px solid var(--gold)':'1px solid transparent';
      dots+='<div style="width:8px;height:8px;border-radius:50%;background:'+dotColor+';border:'+dotBorder+';flex-shrink:0"></div>';
    }

    return '<div class="study-card" onclick="openStudy('+i+')">'+
      '<div class="study-top">'+
        '<img src="'+facAvatar+'" onclick="event.stopPropagation();document.getElementById(\'avatar-zoom-img\').src=\''+facAvatar+'\';document.getElementById(\'avatar-zoom\').style.display=\'flex\'" alt="">'+
        '<div style="flex:1">'+
          '<div class="study-name">'+s.name+'</div>'+
          '<div class="study-ref">'+(s.ref||'')+'</div>'+
        '</div>'+
      '</div>'+
      '<div class="study-meta">'+
        '<span>'+(s.facilNome||s.facil_nome||'Facilitador')+'</span>'+
        '<span>'+mode+'</span>'+
      '</div>'+
      '<div class="progress-bar"><div class="progress-fill" style="width:'+pct+'%"></div></div>'+
      '<div class="progress-text">'+completed+'/'+total+' sessões ('+pct+'%)</div>'+
      '<!-- Timeline visual -->'+
      '<div style="display:flex;gap:3px;flex-wrap:wrap;margin-top:10px;align-items:center">'+dots+'</div>'+
      '<div style="display:flex;justify-content:space-between;margin-top:10px;padding-top:10px;border-top:1px solid rgba(255,255,255,.06)">'+
        '<div style="text-align:left"><p style="font-size:8px;color:rgba(201,168,76,.4);font-family:Cinzel,serif;letter-spacing:1px">INÍCIO</p><p style="font-size:12px;color:rgba(240,234,214,.5)">'+started+'</p></div>'+
        '<div style="text-align:center"><p style="font-size:8px;color:rgba(201,168,76,.4);font-family:Cinzel,serif;letter-spacing:1px">AGENDA</p><p style="font-size:11px;color:rgba(240,234,214,.45)">'+schedText+'</p></div>'+
        '<div style="text-align:right"><p style="font-size:8px;color:rgba(201,168,76,.4);font-family:Cinzel,serif;letter-spacing:1px">PREVISÃO</p><p style="font-size:12px;color:var(--gold)">'+endStr+'</p></div>'+
      '</div>'+
    '</div>';
  }).join('');
}

function toggleNav(){var m=document.getElementById('nav-menu');m.style.display=m.style.display==='none'?'block':'none';}

function openStudy(idx){
  // Salvar índice e redirecionar para salas.html que abre a sessão
  sessionStorage.setItem('spirit_open_study',idx);
  window.location.href='salas.html?study='+idx;
}

function initStars(){
  var sf=document.getElementById('stars');
  if(!sf||sf.children.length>0)return;
  for(var i=0;i<80;i++){
    var d=document.createElement('div');d.className='star';
    var sz=(Math.random()*2.5+.5).toFixed(1);
    d.style.cssText='width:'+sz+'px;height:'+sz+'px;left:'+Math.random()*100+'%;top:'+Math.random()*100+'%;--d:'+(Math.random()*4+2).toFixed(1)+'s;--dl:'+(Math.random()*5).toFixed(1)+'s';
    sf.appendChild(d);
  }
}
initStars();
</script>
</body>
</html>
