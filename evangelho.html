<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#060a16">
<title>MASTER SPIRIT — Evangelho no Lar</title>
<link rel="icon" type="image/x-icon" href="favicon.ico">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Cinzel:wght@400;600&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&display=swap" rel="stylesheet">
<style>
:root{--gold:#C9A84C;--gold2:#E8C97A;--bg:#060a16;--text:#F5EFE0;--fs:18px;--font:'Cinzel',Georgia,serif;--card-bg:rgba(255,255,255,.06);--card-border:rgba(201,168,76,.2);--accent:#C9A84C;--soft:rgba(255,255,255,.04)}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:var(--fs);-webkit-tap-highlight-color:transparent}
p,span,input,textarea,.session-text,.qa-msg,.timer-label,.fac-desc{font-family:Georgia,'Times New Roman',serif}
#app{display:flex;flex-direction:column;height:100%;max-width:900px;margin:0 auto}
#hdr{flex-shrink:0;background:rgba(12,18,38,.88);-webkit-backdrop-filter:blur(16px);backdrop-filter:blur(16px);border-bottom:1px solid rgba(201,168,76,.12);padding:16px 18px;display:flex;align-items:center;gap:14px;z-index:50}
.back{background:none;border:none;cursor:pointer;color:var(--gold);font-size:26px;padding:0}
#hdr-info{flex:1}
#hdr-info h1{font-family:'Cinzel',serif;font-size:15px;color:var(--gold);letter-spacing:2px}
#hdr-info p{font-size:12px;font-style:italic;color:rgba(240,234,214,.35);margin-top:2px}
#step-badge{font-family:'Cinzel',serif;font-size:10px;letter-spacing:1.5px;color:var(--gold);background:rgba(201,168,76,.1);border:1px solid rgba(201,168,76,.3);border-radius:20px;padding:5px 12px;white-space:nowrap}
#main{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:22px 18px 30px}
#controls{flex-shrink:0;border-top:1px solid rgba(201,168,76,.12);padding:14px 18px;background:rgba(12,18,38,.95);display:flex;gap:10px;align-items:center;justify-content:center}
.btn-g{background:var(--accent);border:none;border-radius:14px;padding:14px 28px;color:#F5EFE0;font-family:'Cinzel',serif;font-size:12px;letter-spacing:2px;cursor:pointer;transition:all .2s;text-transform:uppercase;box-shadow:0 2px 8px rgba(201,168,76,.25)}
.btn-g:hover{background:#B8942F}
.btn-g:disabled{opacity:.4;cursor:not-allowed}
.btn-s{background:var(--card-bg);border:1px solid var(--card-border);border-radius:14px;padding:14px 24px;color:rgba(240,234,214,.4);font-family:'Cinzel',serif;font-size:11px;letter-spacing:1.5px;cursor:pointer;transition:all .2s}
.btn-s:hover{background:var(--soft)}
/* Config */
.cfg-section{margin-bottom:22px}
.cfg-label{font-family:'Cinzel',serif;font-size:11px;letter-spacing:2px;color:var(--gold);text-transform:uppercase;margin-bottom:10px}
.cfg-row{display:flex;gap:10px;flex-wrap:wrap}
.cfg-opt{padding:12px 18px;border-radius:12px;border:1px solid var(--card-border);background:var(--card-bg);cursor:pointer;font-size:16px;color:rgba(240,234,214,.7);transition:all .2s;min-width:48px;text-align:center;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.cfg-opt:hover{border-color:var(--accent)}
.cfg-opt.active{background:rgba(201,168,76,.1);border-color:var(--accent);color:var(--gold);font-weight:600}
/* Facilitador */
.fac-card{text-align:center;padding:24px;background:var(--card-bg);border:1px solid var(--card-border);border-radius:16px;margin-bottom:16px;box-shadow:0 2px 8px rgba(0,0,0,.04)}
.fac-emoji{font-size:60px;margin-bottom:12px;display:block}
.fac-card img{transition:transform .3s ease,box-shadow .3s ease;cursor:pointer}
.fac-card img:hover{transform:scale(1.6);z-index:20;position:relative;box-shadow:0 0 30px rgba(201,168,76,.5)}
.fac-name{font-family:'Cinzel',serif;font-size:18px;color:var(--gold);letter-spacing:2px;margin-bottom:4px}
.fac-desc{font-size:15px;font-style:italic;color:rgba(240,234,214,.4);margin-bottom:8px}
.fac-style{font-size:12px;color:var(--gold);font-family:'Cinzel',serif;letter-spacing:1.5px}
/* Índice dos capítulos */
.cap-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;padding:10px 0}
.cap-item{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:12px;cursor:pointer;transition:all .3s;position:relative;overflow:hidden}
.cap-item:hover{border-color:rgba(201,168,76,.4);background:rgba(201,168,76,.06)}
.cap-item.current{border-color:var(--gold);background:rgba(201,168,76,.1);box-shadow:0 0 20px rgba(201,168,76,.15)}
.cap-item.done{border-color:rgba(91,175,124,.3);background:rgba(91,175,124,.04)}
.cap-item .cap-num{font-family:'Cinzel',serif;font-size:9px;color:rgba(201,168,76,.5);letter-spacing:1px}
.cap-item .cap-title{font-size:12px;color:rgba(240,234,214,.7);margin-top:3px;line-height:1.4}
.cap-item .cap-badge{position:absolute;top:6px;right:6px;font-size:10px}
/* Efeito zoom ao selecionar */
@keyframes capZoom{0%{transform:scale(1);opacity:1}50%{transform:scale(1.05);opacity:.8}100%{transform:scale(30);opacity:0}}
.cap-item.zooming{animation:capZoom .6s ease forwards;z-index:10}
/* Efeito abertura de página */
@keyframes pageOpen{0%{opacity:0;transform:perspective(800px) rotateY(-90deg)}60%{transform:perspective(800px) rotateY(5deg)}100%{opacity:1;transform:perspective(800px) rotateY(0)}}
.page-opening{animation:pageOpen .8s ease both}
/* Session content */
.session-text{font-size:var(--fs);line-height:1.85;white-space:pre-wrap;color:var(--text);animation:fadeup .5s ease}
.ref-text{font-family:'Cinzel',serif;font-size:10px;letter-spacing:2px;color:var(--gold);margin-top:14px;text-align:right}
/* Timer */
.timer{text-align:center;padding:40px 20px}
.timer-num{font-family:'Cinzel',serif;font-size:52px;color:var(--gold);letter-spacing:4px}
.timer-label{font-style:italic;font-size:15px;color:rgba(240,234,214,.4);margin-top:10px}
/* Breathing */
.breath{width:100px;height:100px;border-radius:50%;background:radial-gradient(circle,rgba(201,168,76,.2),transparent);margin:20px auto;animation:breathe 6s ease-in-out infinite}
@keyframes breathe{0%,100%{transform:scale(.8);opacity:.4}50%{transform:scale(1.2);opacity:.8}}
/* Chat Q&A */
.qa-msg{margin-bottom:12px;padding:14px 16px;border-radius:14px;font-size:16px;line-height:1.7;animation:fadeup .3s ease}
.qa-prof{background:rgba(255,255,255,.04);border-left:3px solid var(--accent);color:rgba(240,234,214,.75)}
.qa-user{background:rgba(91,175,124,.06);border-left:3px solid rgba(91,175,124,.5)}
.qa-label{font-family:'Cinzel',serif;font-size:9px;letter-spacing:1.5px;color:var(--gold);display:block;margin-bottom:5px}
#qa-input-row{display:flex;gap:8px;margin-top:16px}
#qa-input-row input{flex:1;background:rgba(255,255,255,.05);border:1px solid rgba(201,168,76,.22);border-radius:12px;padding:13px 16px;color:var(--text);font-family:Georgia,serif;font-size:16px;outline:none}
#qa-input-row input:focus{border-color:var(--accent)}
#qa-input-row button{background:rgba(201,168,76,.15);border:1px solid rgba(201,168,76,.4);border-radius:12px;padding:12px 16px;cursor:pointer;color:var(--gold);font-size:16px}
/* Stars */
#stars{position:fixed;inset:0;pointer-events:none;z-index:0;max-width:900px;margin:0 auto}
.star{position:absolute;background:white;border-radius:50%;animation:tw var(--d,3s) ease-in-out infinite var(--dl,0s)}
@keyframes tw{0%,100%{opacity:.05}50%{opacity:.65}}
@keyframes fadeup{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div id="stars"></div>
<div id="app">
  <div id="hdr">
    <div id="hdr-info" style="flex:1">
      <h1>EVANGELHO NO LAR</h1>
      <p>O Evangelho Segundo o Espiritismo</p>
    </div>
    <span id="step-badge">Configuração</span>
    <button id="ev-podcast-btn" onclick="toggleEvPodcast()" style="background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:6px;width:28px;height:28px;cursor:pointer;color:rgba(240,234,214,.5);font-size:14px;display:none" title="Ouvir como podcast">🎧</button>
    <button onclick="toggleNav()" style="background:none;border:1px solid var(--card-border,#E8E0D0);border-radius:10px;padding:8px 10px;cursor:pointer;font-size:14px;color:var(--gold,#8B7535);margin-left:8px" title="Menu">☰</button>
  </div>
  <div id="nav-menu" style="display:none;position:sticky;top:56px;z-index:49;background:rgba(12,18,38,.95);border-bottom:1px solid rgba(201,168,76,.15);padding:10px 18px;box-shadow:0 4px 12px rgba(0,0,0,.3)">
    <a href="app.html" style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid rgba(201,168,76,.08);text-decoration:none;color:#F5EFE0">
      <span style="font-size:18px">🕊️</span><span style="font-size:15px;font-family:'Cinzel',serif">Mestres Espirituais</span></a>
    <a href="salas.html" style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid rgba(201,168,76,.08);text-decoration:none;color:#F5EFE0">
      <span style="font-size:18px">📚</span><span style="font-size:15px;font-family:'Cinzel',serif">Salas de Estudo</span></a>
    <a href="meus-estudos.html" style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid rgba(201,168,76,.08);text-decoration:none;color:#F5EFE0">
      <span style="font-size:18px">📖</span><span style="font-size:15px;font-family:'Cinzel',serif">Meus Estudos</span></a>
    <a href="evangelho.html" style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid rgba(201,168,76,.08);text-decoration:none;color:#E8C97A;font-weight:600">
      <span style="font-size:18px">🕯️</span><span style="font-size:15px;font-family:'Cinzel',serif">Evangelho no Lar</span></a>
    <a href="passe.html" style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid rgba(201,168,76,.08);text-decoration:none;color:#F5EFE0">
      <span style="font-size:18px">🙌</span><span style="font-size:15px;font-family:'Cinzel',serif">Passe Espiritual</span></a>
    <a href="app.html" style="display:flex;align-items:center;gap:10px;padding:10px 0;text-decoration:none;color:rgba(240,234,214,.4)">
      <span style="font-size:18px">🏠</span><span style="font-size:15px;font-family:'Cinzel',serif">Início</span></a>
  </div>
  <div id="main"></div>
  <div id="controls"></div>
</div>

<script>
// ── FACILITADORES ──
var FACILITADORES=[
  {id:'antonio',nome:'Mestre Antonio',descricao:'Sábio ancião, profundo conhecedor das escrituras sagradas',estilo:'sábio',avatar:'avatar-mestre-antonio.png'},

  {id:'wander',nome:'Mestre Wander',descricao:'Disciplinado e estratégico, conduz o estudo com foco e profundidade',estilo:'contemplativo',avatar:'avatar-mestre-wander.png'},
  {id:'silvestre',nome:'Mestre Silvestre',descricao:'Médico espiritual, cuida da alma com dedicação e compaixão',estilo:'compassivo',avatar:'avatar-mestre-silvestre.png'},
  {id:'naim',nome:'Mestre Naim',descricao:'Filósofo espiritual, conecta o Oriente e o Ocidente com harmonia',estilo:'sábio',emoji:'🧓'},
  {id:'genivaldo',nome:'Mestre Genivaldo',descricao:'Humilde e profundo, homem de poucas mas transformadoras palavras',estilo:'contemplativo',emoji:'👴'},
  {id:'navarro',nome:'Mestre Navarro',descricao:'Líder nato, conduz com firmeza amorosa e visão ampla',estilo:'encorajador',emoji:'🧑‍💼'}
];

// ── PASSAGENS DO EVANGELHO (amostra caps 1-5) ──
var PASSAGENS=[
  {cap:1,titulo:'Não vim destruir a lei',itens:[
    {n:1,texto:'Não penseis que vim destruir a lei ou os profetas; não vim para destruir, mas para cumprir.'},
    {n:2,texto:'O Cristo não veio destruir a lei mosaica, mas dar-lhe o verdadeiro sentido, desenvolvê-la e completá-la.'},
    {n:3,texto:'A lei mosaica pode dividir-se em duas partes: a lei de Moisés propriamente dita e a lei de Deus.'}
  ]},
  {cap:2,titulo:'Meu reino não é deste mundo',itens:[
    {n:1,texto:'Respondeu Jesus: O meu reino não é deste mundo; se o meu reino fosse deste mundo, os meus servos teriam combatido.'},
    {n:2,texto:'A vida futura é a vida normal do espírito; a vida terrestre é transitória e passageira.'},
    {n:3,texto:'Jesus definiu claramente a diferença entre a vida terrestre e a vida espiritual, indicando que a verdadeira pátria do espírito não é a Terra.'}
  ]},
  {cap:3,titulo:'Há muitas moradas na casa de meu Pai',itens:[
    {n:1,texto:'Na casa de meu Pai há muitas moradas; se assim não fosse, eu vo-lo teria dito, pois vou preparar-vos um lugar.'},
    {n:2,texto:'A casa do Pai é o Universo. As diferentes moradas são os mundos que circulam no espaço infinito e oferecem aos espíritos errantes estações apropriadas ao seu adiantamento.'},
    {n:3,texto:'A pluralidade dos mundos habitados é uma das grandes verdades reveladas pelo Espiritismo, confirmando as palavras de Jesus.'}
  ]},
  {cap:4,titulo:'Ninguém poderá ver o reino de Deus se não nascer de novo',itens:[
    {n:1,texto:'Em verdade vos digo: se alguém não nascer de novo, não poderá ver o reino de Deus.'},
    {n:2,texto:'A reencarnação é o princípio fundamental da doutrina espírita. A alma, criada simples e ignorante, progride através de existências sucessivas.'},
    {n:3,texto:'Nascer de novo é renascer em outro corpo. A alma já viveu e viverá ainda. Cada existência é um passo a mais na estrada do progresso.'}
  ]},
  {cap:5,titulo:'Bem-aventurados os aflitos',itens:[
    {n:1,texto:'Bem-aventurados os que choram, porque serão consolados.'},
    {n:2,texto:'As aflições da Terra são provas e expiações. Felizes os que as suportam com paciência, porque delas sairão purificados.'},
    {n:3,texto:'O sofrimento é ao mesmo tempo a consequência das faltas passadas e a escola onde o espírito aprende e se fortalece.'},
    {n:4,texto:'Jesus disse: Bem-aventurados os aflitos — não porque o sofrimento seja um bem em si, mas porque é o caminho necessário para a cura da alma.'}
  ]}
];

// Títulos completos dos 28 capítulos
var CAPITULOS=[
  {n:1,t:'Não vim destruir a lei'},
  {n:2,t:'Meu reino não é deste mundo'},
  {n:3,t:'Há muitas moradas na casa de meu Pai'},
  {n:4,t:'Ninguém poderá ver o reino de Deus se não nascer de novo'},
  {n:5,t:'Bem-aventurados os aflitos'},
  {n:6,t:'O Cristo Consolador'},
  {n:7,t:'Bem-aventurados os pobres de espírito'},
  {n:8,t:'Bem-aventurados os que têm puro o coração'},
  {n:9,t:'Bem-aventurados os que são brandos e pacíficos'},
  {n:10,t:'Bem-aventurados os que são misericordiosos'},
  {n:11,t:'Amar o próximo como a si mesmo'},
  {n:12,t:'Amai os vossos inimigos'},
  {n:13,t:'Que a mão esquerda não saiba o que faz a direita'},
  {n:14,t:'Honrai vosso pai e vossa mãe'},
  {n:15,t:'Fora da caridade não há salvação'},
  {n:16,t:'Não se pode servir a Deus e a Mamon'},
  {n:17,t:'Sede perfeitos'},
  {n:18,t:'Muitos os chamados, poucos os escolhidos'},
  {n:19,t:'A fé transporta montanhas'},
  {n:20,t:'Os trabalhadores da última hora'},
  {n:21,t:'Haverá falsos cristos e falsos profetas'},
  {n:22,t:'Não separeis o que Deus juntou'},
  {n:23,t:'Estranha moral'},
  {n:24,t:'Não ponhais a candeia debaixo do alqueire'},
  {n:25,t:'Buscai e achareis'},
  {n:26,t:'Dai gratuitamente o que gratuitamente recebestes'},
  {n:27,t:'Pedi e obtereis'},
  {n:28,t:'Coletânea de preces espíritas'}
];

// ── ESTADO ──
var fase='config'; // config, facilitador, prece1, leitura, comentarios, vibracoes, prece2, fim
var facilitador=null;
var config={duracao:20,modo:'sequencial',participantes:'1',contexto:''};
var trechoAtual={cap:1,item:1,titulo:'',texto:''};
var timerInterval=null;
var lessonContext='';

// ── INIT ──
window.addEventListener('load',function(){
  // Stars
  var sf=document.getElementById('stars');
  for(var i=0;i<80;i++){var d=document.createElement('div');d.className='star';var sz=(Math.random()*2.5+.5).toFixed(1);d.style.cssText='left:'+(Math.random()*100).toFixed(1)+'%;top:'+(Math.random()*100).toFixed(1)+'%;width:'+sz+'px;height:'+sz+'px;--d:'+(Math.random()*4+2).toFixed(1)+'s;--dl:'+(Math.random()*5).toFixed(1)+'s';sf.appendChild(d);}
  // Load config
  try{var saved=JSON.parse(localStorage.getItem('spirit_evangelho_config'));if(saved) config=saved;}catch(e){}
  // Load progress
  try{var prog=JSON.parse(localStorage.getItem('spirit_evangelho_prog'));if(prog){trechoAtual.cap=prog.cap||1;trechoAtual.item=prog.item||1;}}catch(e){}
  renderFase();
});

// ── PODCAST (Web Speech API) ──
var evPodcastPlaying=false;
function toggleEvPodcast(){
  if(evPodcastPlaying){speechSynthesis.cancel();evPodcastPlaying=false;updateEvPodcastBtn();return;}
  var main=document.getElementById('main');
  if(!main||!main.textContent.trim()) return;
  if(!('speechSynthesis' in window)){alert('Navegador não suporta leitura em voz.');return;}

  var text=main.textContent;
  var voices=speechSynthesis.getVoices();
  var savedURI=localStorage.getItem('spirit_voice_uri')||'';
  var voice=savedURI?voices.find(function(v){return v.voiceURI===savedURI;}):null;
  if(!voice) voice=voices.find(function(v){return v.lang.startsWith('pt');});
  var rate=parseFloat(localStorage.getItem('spirit_voice_rate')||'0.9');
  var pitch=parseFloat(localStorage.getItem('spirit_voice_pitch')||'1');

  var utt=new SpeechSynthesisUtterance(text);
  utt.lang='pt-BR';utt.rate=rate;utt.pitch=pitch;utt.volume=1;
  if(voice) utt.voice=voice;
  utt.onstart=function(){evPodcastPlaying=true;updateEvPodcastBtn();};
  utt.onend=function(){evPodcastPlaying=false;updateEvPodcastBtn();};
  utt.onerror=function(){evPodcastPlaying=false;updateEvPodcastBtn();};
  speechSynthesis.speak(utt);
}
function updateEvPodcastBtn(){
  var btn=document.getElementById('ev-podcast-btn');
  if(!btn)return;
  btn.textContent=evPodcastPlaying?'⏹':'🎧';
  btn.style.color=evPodcastPlaying?'var(--gold)':'rgba(240,234,214,.5)';
}

// ── WIND CHIMES (áudio MP3) ──
var _chimesAudio=null;

function startWindChimes(){
  try{
    _chimesAudio=new Audio('wind-chimes.mp3');
    _chimesAudio.loop=true;
    _chimesAudio.volume=1;
    _chimesAudio.play().catch(function(){});
  }catch(e){console.warn('Wind chimes error:',e);}
}

function stopWindChimes(){
  if(_chimesAudio){_chimesAudio.pause();_chimesAudio.currentTime=0;_chimesAudio=null;}
}

function toggleNav(){
  var m=document.getElementById('nav-menu');
  m.style.display=m.style.display==='none'?'block':'none';
}

function goBack(){
  if(fase==='config') toggleNav();
  else{fase='config';renderFase();}
}

function renderFase(){
  var m=document.getElementById('main');
  var c=document.getElementById('controls');
  var badge=document.getElementById('step-badge');
  // Mostrar botão podcast nas fases com conteúdo
  var podBtn=document.getElementById('ev-podcast-btn');
  var showPod=['prece1','leitura','comentarios','vibracoes','prece2'].indexOf(fase)>=0;
  if(podBtn) podBtn.style.display=showPod?'inline-flex':'none';
  // Parar podcast ao mudar de fase
  if(evPodcastPlaying){speechSynthesis.cancel();evPodcastPlaying=false;updateEvPodcastBtn();}

  if(fase==='config'){
    badge.textContent='Configuração';
    m.innerHTML=renderConfig();
    c.innerHTML='<button class="btn-g" onclick="iniciarSessao()">✦ Iniciar Sessão</button>';
  }
  else if(fase==='facilitador'){
    badge.textContent='Facilitador';
    m.innerHTML=renderFacilitador();
    c.innerHTML='<button class="btn-s" onclick="sortearFacilitador()">🎲 Outro</button><button class="btn-g" onclick="avancar()">Confirmar</button>';
  }
  else if(fase==='prece1'){
    badge.textContent='1 de 5 · Prece Inicial';
    m.innerHTML='<div class="session-text" style="text-align:center;padding:20px;color:rgba(201,168,76,.5);font-style:italic">O facilitador está preparando a prece...</div>';

// ── FACILITADOR ──
function sortearFacilitador(){
  var idx=Math.floor(Math.random()*FACILITADORES.length);
  facilitador=FACILITADORES[idx];
  document.getElementById('main').innerHTML=renderFacilitador();
}

function renderFacilitador(){
  if(!facilitador) sortearFacilitador();

    ?'<img src="'+facilitador.avatar+'" style="width:48px;height:48px;border-radius:50%;object-fit:cover;border:2px solid rgba(201,168,76,.3);margin-bottom:6px">'

// ── NAVEGAÇÃO ──
function iniciarSessao(){
  sortearFacilitador();
  fase='facilitador';
  renderFase();
}

function avancar(){
  if(timerInterval){clearInterval(timerInterval);timerInterval=null;}
  // Parar música da prece ao sair da etapa
  if(fase==='prece1'||fase==='prece2'){stopPreceMusic();stopPaiNosso();}
  // Parar wind chimes ao sair das vibrações
  if(fase==='vibracoes') stopWindChimes();
  var fases=['config','facilitador','prece1','leitura','comentarios','vibracoes','prece2','fim'];
  var idx=fases.indexOf(fase);
  if(idx<fases.length-1){fase=fases[idx+1];renderFase();}
}

// ── SELEÇÃO DE CAPÍTULO (índice visual) ──
function selectCap(n){
  // Efeito zoom no card selecionado
  var el=document.getElementById('cap-'+n);
  if(el){
    el.classList.add('zooming');
    // Salvar progresso
    localStorage.setItem('spirit_evang_cap',n);
  }
  // Após zoom, mostrar leitura com efeito de abertura de página
  setTimeout(function(){
    // Selecionar trecho do capítulo
    var cap=PASSAGENS.find(function(p){return p.cap===n;});
    if(cap){
      var item=cap.itens[0];
      trechoAtual={cap:cap.cap,item:item.n,titulo:cap.titulo,texto:item.texto};
    } else {
      // Capítulo não cadastrado nas PASSAGENS — usar título do CAPITULOS
      var titulo=CAPITULOS.find(function(c){return c.n===n;});
      trechoAtual={cap:n,item:1,titulo:titulo?titulo.t:'Capítulo '+n,texto:'Conteúdo deste capítulo será gerado pelo facilitador durante os comentários.'};
    }
    var m=document.getElementById('main');
    m.innerHTML='<div class="page-opening">'+renderLeitura()+'</div>';
    document.getElementById('controls').innerHTML='<button class="btn-g" onclick="avancar()">Li a passagem</button>';
  },600);
}

// ── SELEÇÃO DE TRECHO ──
function selecionarTrecho(random){
  if(config.modo==='aleatorio'||random){
    var cap=PASSAGENS[Math.floor(Math.random()*PASSAGENS.length)];
    var item=cap.itens[Math.floor(Math.random()*cap.itens.length)];
    trechoAtual={cap:cap.cap,item:item.n,titulo:cap.titulo,texto:item.texto};
  } else {
    // Sequencial
    var cap=PASSAGENS.find(function(p){return p.cap===trechoAtual.cap;});
    if(!cap){cap=PASSAGENS[0];trechoAtual.cap=cap.cap;trechoAtual.item=1;}
    var item=cap.itens.find(function(i){return i.n===trechoAtual.item;});
    if(!item){item=cap.itens[0];trechoAtual.item=item.n;}
    trechoAtual.titulo=cap.titulo;
    trechoAtual.texto=item.texto;
  }
}

function renderLeitura(){
  return '<div style="animation:fadeup .5s ease">'+

}

// ── PRECE (IA) ──
// ── MÚSICA DE PRECE ──
var _preceAudio=null;
function startPreceMusic(){
  stopPreceMusic();
  if(_previewAudio){_previewAudio.pause();_previewAudio=null;}
  var file=config.musica||'splash-music.mp3';
  _preceAudio=new Audio(file);
  _preceAudio.volume=0;
  _preceAudio.loop=true;
  _preceAudio.play().catch(function(){});
  // Fade in suave
  var vol=0;
  var fadeIn=setInterval(function(){
    vol+=0.02;
    if(vol>=0.5){vol=0.5;clearInterval(fadeIn);}
    if(_preceAudio) _preceAudio.volume=vol;
  },100);
}
function stopPreceMusic(){
  if(!_preceAudio) return;
  // Fade out suave
  var fadeOut=setInterval(function(){
    if(!_preceAudio){clearInterval(fadeOut);return;}
    _preceAudio.volume=Math.max(0,_preceAudio.volume-0.02);
    if(_preceAudio.volume<=0.01){
      _preceAudio.pause();_preceAudio.currentTime=0;_preceAudio=null;
      clearInterval(fadeOut);
    }
  },80);
}

async function gerarPrece(tipo){
  // Iniciar música de fundo
  startPreceMusic();
  try{
    var r=await fetch('/api/evangelho-chat',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({action:tipo,facilitador:facilitador,capitulo:trechoAtual.cap,item:trechoAtual.item,participantes:config.participantes,contexto:config.contexto})});
    var d=await r.json();
    var txt=d.text||'Não foi possível gerar a prece.';
    document.getElementById('main').innerHTML='<div class="session-text" style="padding:10px">'+txt+'</div>';
    var btn=document.getElementById('btn-av');if(btn) btn.disabled=false;
  }catch(e){
    document.getElementById('main').innerHTML='<div class="session-text" style="color:rgba(232,122,122,.7);text-align:center">Erro de conexão. Tente novamente.</div>';
  }
}

function renderVibracoes(mins){

    '<p style="font-family:Cinzel,serif;font-size:10px;letter-spacing:3px;color:rgba(201,168,76,.4);margin-bottom:16px">MOMENTO DE SILÊNCIO E VIBRAÇÕES</p>'+

    '<p class="timer-label">Feche os olhos. Respire. Envie boas vibrações.</p>'+
    '</div>';

function iniciarTimer(secs){
  var remaining=secs;
  updateTimerDisplay(remaining);
  timerInterval=setInterval(function(){
    remaining--;
    if(remaining<=0){clearInterval(timerInterval);timerInterval=null;avancar();return;}
    updateTimerDisplay(remaining);
  },1000);
}

function updateTimerDisplay(s){
  var m=Math.floor(s/60);var sec=s%60;
  var el=document.getElementById('timer-display');
  if(el) el.textContent=String(m).padStart(2,'0')+':'+String(sec).padStart(2,'0');
}

function salvarProgresso(){
  // Avançar progresso sequencial
  var cap=PASSAGENS.find(function(p){return p.cap===trechoAtual.cap;});
  if(cap){
    var nextItem=trechoAtual.item+1;
    if(nextItem>cap.itens.length){
      var capIdx=PASSAGENS.indexOf(cap);
      if(capIdx<PASSAGENS.length-1){trechoAtual.cap=PASSAGENS[capIdx+1].cap;trechoAtual.item=1;}
      else{trechoAtual.cap=1;trechoAtual.item=1;} // voltou ao início
    } else {trechoAtual.item=nextItem;}
  }
  localStorage.setItem('spirit_evangelho_prog',JSON.stringify({cap:trechoAtual.cap,item:trechoAtual.item}));
}
