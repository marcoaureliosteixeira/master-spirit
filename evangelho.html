<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#060a16">
<title>MASTER SPIRIT — Evangelho no Lar</title>
<link rel="icon" type="image/x-icon" href="favicon.ico">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Cinzel:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{--gold:#C9A84C;--gold2:#E8C97A;--bg:#060a16;--text:#F5EFE0;--fs:18px;--font:'Cinzel',Georgia,serif;--card-bg:rgba(255,255,255,.06);--card-border:rgba(201,168,76,.2);--accent:#C9A84C;--soft:rgba(255,255,255,.04)}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:var(--fs);-webkit-tap-highlight-color:transparent}
p,span,input,textarea,.session-text,.qa-msg,.timer-label,.fac-desc{font-family:Georgia,'Times New Roman',serif}
#app{display:flex;flex-direction:column;height:100%;max-width:900px;margin:0 auto}
#hdr{flex-shrink:0;background:rgba(12,18,38,.88);-webkit-backdrop-filter:blur(16px);backdrop-filter:blur(16px);border-bottom:1px solid rgba(201,168,76,.12);padding:14px 18px;display:flex;align-items:center;gap:14px;z-index:50}
.back{background:none;border:none;cursor:pointer;color:var(--gold);font-size:26px;padding:0}
#hdr-info{flex:1}
#hdr-info h1{font-family:'Cinzel',serif;font-size:14px;color:var(--gold);letter-spacing:2px}
#hdr-info p{font-size:12px;font-style:italic;color:rgba(240,234,214,.35);margin-top:2px}
#step-badge{font-family:'Cinzel',serif;font-size:10px;letter-spacing:1.5px;color:var(--gold);background:rgba(201,168,76,.1);border:1px solid rgba(201,168,76,.3);border-radius:20px;padding:5px 12px;white-space:nowrap}
#main{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:22px 18px 30px}
#controls{flex-shrink:0;border-top:1px solid rgba(201,168,76,.12);padding:14px 18px;background:rgba(12,18,38,.95);display:flex;gap:10px;align-items:center;justify-content:center}
.btn-g{background:var(--accent);border:none;border-radius:14px;padding:14px 28px;color:#F5EFE0;font-family:'Cinzel',serif;font-size:12px;letter-spacing:2px;cursor:pointer;transition:all .2s;text-transform:uppercase;box-shadow:0 2px 8px rgba(201,168,76,.25)}
.btn-g:hover{background:#B8942F}
.btn-g:disabled{opacity:.4;cursor:not-allowed}
.btn-s{background:var(--card-bg);border:1px solid var(--card-border);border-radius:14px;padding:14px 24px;color:rgba(240,234,214,.4);font-family:'Cinzel',serif;font-size:11px;letter-spacing:1.5px;cursor:pointer;transition:all .2s}
.btn-s:hover{background:var(--soft)}
/* Config */
.cfg-section{margin-bottom:22px}
.cfg-label{font-family:'Cinzel',serif;font-size:11px;letter-spacing:2px;color:var(--gold);text-transform:uppercase;margin-bottom:10px}
.cfg-row{display:flex;gap:10px;flex-wrap:wrap}
.cfg-opt{padding:12px 18px;border-radius:12px;border:1px solid var(--card-border);background:var(--card-bg);cursor:pointer;font-size:16px;color:rgba(240,234,214,.7);transition:all .2s;min-width:48px;text-align:center;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.cfg-opt:hover{border-color:var(--accent)}
.cfg-opt.active{background:rgba(201,168,76,.1);border-color:var(--accent);color:var(--gold);font-weight:600}
/* Facilitador */
.fac-card{text-align:center;padding:24px;background:var(--card-bg);border:1px solid var(--card-border);border-radius:16px;margin-bottom:16px;box-shadow:0 2px 8px rgba(0,0,0,.04)}
.fac-emoji{font-size:60px;margin-bottom:12px;display:block}
.fac-card img{transition:transform .3s ease,box-shadow .3s ease;cursor:pointer}
.fac-card img:hover{transform:scale(1.6);z-index:20;position:relative;box-shadow:0 0 30px rgba(201,168,76,.5)}
.fac-name{font-family:'Cinzel',serif;font-size:18px;color:var(--gold);letter-spacing:2px;margin-bottom:4px}
.fac-desc{font-size:15px;font-style:italic;color:rgba(240,234,214,.4);margin-bottom:8px}
.fac-style{font-size:12px;color:var(--gold);font-family:'Cinzel',serif;letter-spacing:1.5px}
/* Índice dos capítulos */
.cap-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;padding:10px 0}
.cap-item{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:12px;cursor:pointer;transition:all .3s;position:relative;overflow:hidden}
.cap-item:hover{border-color:rgba(201,168,76,.4);background:rgba(201,168,76,.06)}
.cap-item.current{border-color:var(--gold);background:rgba(201,168,76,.1);box-shadow:0 0 20px rgba(201,168,76,.15)}
.cap-item.done{border-color:rgba(91,175,124,.3);background:rgba(91,175,124,.04)}
.cap-item .cap-num{font-family:'Cinzel',serif;font-size:9px;color:rgba(201,168,76,.5);letter-spacing:1px}
.cap-item .cap-title{font-size:12px;color:rgba(240,234,214,.7);margin-top:3px;line-height:1.4}
.cap-item .cap-badge{position:absolute;top:6px;right:6px;font-size:10px}
/* Efeito zoom ao selecionar */
@keyframes capZoom{0%{transform:scale(1);opacity:1}50%{transform:scale(1.05);opacity:.8}100%{transform:scale(30);opacity:0}}
.cap-item.zooming{animation:capZoom .6s ease forwards;z-index:10}
/* Efeito abertura de página */
@keyframes pageOpen{0%{opacity:0;transform:perspective(800px) rotateY(-90deg)}60%{transform:perspective(800px) rotateY(5deg)}100%{opacity:1;transform:perspective(800px) rotateY(0)}}
.page-opening{animation:pageOpen .8s ease both}
/* Session content */
.session-text{font-size:var(--fs);line-height:1.85;white-space:pre-wrap;color:var(--text);animation:fadeup .5s ease}
.ref-text{font-family:'Cinzel',serif;font-size:10px;letter-spacing:2px;color:var(--gold);margin-top:14px;text-align:right}
/* Timer */
.timer{text-align:center;padding:40px 20px}
.timer-num{font-family:'Cinzel',serif;font-size:52px;color:var(--gold);letter-spacing:4px}
.timer-label{font-style:italic;font-size:15px;color:rgba(240,234,214,.4);margin-top:10px}
/* Breathing */
.breath{width:100px;height:100px;border-radius:50%;background:radial-gradient(circle,rgba(201,168,76,.2),transparent);margin:20px auto;animation:breathe 6s ease-in-out infinite}
@keyframes breathe{0%,100%{transform:scale(.8);opacity:.4}50%{transform:scale(1.2);opacity:.8}}
/* Chat Q&A */
.qa-msg{margin-bottom:12px;padding:14px 16px;border-radius:14px;font-size:16px;line-height:1.7;animation:fadeup .3s ease}
.qa-prof{background:rgba(255,255,255,.04);border-left:3px solid var(--accent);color:rgba(240,234,214,.75)}
.qa-user{background:rgba(91,175,124,.06);border-left:3px solid rgba(91,175,124,.5)}
.qa-label{font-family:'Cinzel',serif;font-size:9px;letter-spacing:1.5px;color:var(--gold);display:block;margin-bottom:5px}
#qa-area{display:flex;flex-direction:column;min-height:50vh}
#qa-list{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;max-height:50vh}
#qa-input-row{display:flex;gap:8px;margin-top:16px;position:sticky;bottom:0}
#qa-input-row textarea{flex:1;background:rgba(255,255,255,.05);border:1px solid rgba(201,168,76,.22);border-radius:12px;padding:13px 16px;color:var(--text);font-family:Georgia,serif;font-size:16px;outline:none;resize:none;min-height:44px;max-height:120px;line-height:1.4}
#qa-input-row textarea:focus{border-color:var(--accent)}
#qa-input-row button{background:rgba(201,168,76,.15);border:1px solid rgba(201,168,76,.4);border-radius:12px;padding:12px 16px;cursor:pointer;color:var(--gold);font-size:16px}
#qa-mic-btn{border-radius:50%;width:44px;height:44px;padding:0;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .2s}
#qa-mic-btn.recording{background:rgba(220,60,60,.2);border-color:rgba(220,60,60,.6);color:#e85050;animation:mic-pulse 1s ease-in-out infinite}
@keyframes mic-pulse{0%,100%{box-shadow:0 0 0 0 rgba(220,60,60,.3)}50%{box-shadow:0 0 0 8px rgba(220,60,60,0)}}
/* Stars */
#stars{position:fixed;inset:0;pointer-events:none;z-index:0;max-width:900px;margin:0 auto}
.star{position:absolute;background:white;border-radius:50%;animation:tw var(--d,3s) ease-in-out infinite var(--dl,0s)}
@keyframes tw{0%,100%{opacity:.05}50%{opacity:.65}}
@keyframes fadeup{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div id="stars"></div>
<div id="app">
  <div id="hdr">
    <button id="back-btn" onclick="voltarEtapa()" style="background:none;border:none;cursor:pointer;color:var(--gold);font-size:22px;padding:0">‹</button>
    <img src="evangelho-lar.png?v=2" style="width:36px;height:36px;border-radius:50%;object-fit:cover;border:1px solid rgba(201,168,76,.3);flex-shrink:0" alt="" onerror="this.style.display='none'">
    <div style="flex:1;min-width:0">
      <h1 style="font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">EVANGELHO NO LAR</h1>
      <span id="step-badge" style="font-size:9px;color:rgba(240,234,214,.35);font-family:Georgia,serif"></span>
    </div>
    <button id="ev-podcast-btn" onclick="toggleEvPodcast()" style="background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:6px;width:28px;height:28px;cursor:pointer;color:rgba(240,234,214,.5);font-size:14px;display:none;flex-shrink:0" title="Ouvir">🎧</button>
    <a href="app.html" onclick="sessionStorage.removeItem('spirit_splash_seen')" style="border:1px solid rgba(201,168,76,.2);border-radius:10px;padding:6px 8px;text-decoration:none;flex-shrink:0" title="Menu Principal"><img src="home-icone.png" style="height:20px;opacity:.8" alt="Home"></a>
  </div>
  <div id="main"></div>
  <div id="controls"></div>
  <div style="text-align:center;padding:16px;border-top:1px solid rgba(201,168,76,.1);margin-top:20px">
    <div style="display:flex;align-items:center;gap:6px;justify-content:center">
      <span style="font-family:'Cinzel',serif;font-size:7px;letter-spacing:2px;color:rgba(240,234,214,.25);text-transform:uppercase">Powered by</span>
      <img src="logo-spyrit-systems.png" style="height:22px;opacity:.6" alt="Spyrit Systems">
    </div>
  </div>
</div>

<script>
// ── FACILITADORES ──
var FACILITADORES=[
  {id:'antonio',nome:'Mestre Antonio',descricao:'Sábio ancião, profundo conhecedor das escrituras sagradas',estilo:'sábio',avatar:'avatar-mestre-antonio.png'},
  {id:'adriano',nome:'Mestre Adriano',descricao:'Orador eloquente, inspira pela clareza e profundidade',estilo:'encorajador',avatar:'avatar-mestre-adriano.png'},
  {id:'leila',nome:'Mestra Leila',descricao:'Gentil e maternal, acolhe com ternura e sabedoria',estilo:'acolhedor',avatar:'avatar-mestre-leila.png'},
  {id:'bia',nome:'Mestra Bia',descricao:'Educadora paciente, especialista em ensinar com amor',estilo:'encorajador',avatar:'avatar-mestra-bia.png'},
  {id:'wander',nome:'Mestre Wander',descricao:'Disciplinado e estratégico, conduz o estudo com foco e profundidade',estilo:'contemplativo',avatar:'avatar-mestre-wander.png'},
  {id:'silvestre',nome:'Mestre Silvestre',descricao:'Médico espiritual, cuida da alma com dedicação e compaixão',estilo:'compassivo',avatar:'avatar-mestre-silvestre.png'},
  {id:'naim',nome:'Mestre Naim',descricao:'Filósofo espiritual, conecta o Oriente e o Ocidente com harmonia',estilo:'sábio',emoji:'🧓'},
  {id:'genivaldo',nome:'Mestre Genivaldo',descricao:'Humilde e profundo, homem de poucas mas transformadoras palavras',estilo:'contemplativo',emoji:'👴'},
  {id:'navarro',nome:'Mestre Navarro',descricao:'Líder nato, conduz com firmeza amorosa e visão ampla',estilo:'encorajador',emoji:'🧑‍💼'}
];

// ── PASSAGENS DO EVANGELHO (amostra caps 1-5) ──
var PASSAGENS=[
  {cap:1,titulo:'Não vim destruir a lei',itens:[
    {n:1,texto:'Não penseis que vim destruir a lei ou os profetas; não vim para destruir, mas para cumprir.'},
    {n:2,texto:'O Cristo não veio destruir a lei mosaica, mas dar-lhe o verdadeiro sentido, desenvolvê-la e completá-la.'},
    {n:3,texto:'A lei mosaica pode dividir-se em duas partes: a lei de Moisés propriamente dita e a lei de Deus.'}
  ]},
  {cap:2,titulo:'Meu reino não é deste mundo',itens:[
    {n:1,texto:'Respondeu Jesus: O meu reino não é deste mundo; se o meu reino fosse deste mundo, os meus servos teriam combatido.'},
    {n:2,texto:'A vida futura é a vida normal do espírito; a vida terrestre é transitória e passageira.'},
    {n:3,texto:'Jesus definiu claramente a diferença entre a vida terrestre e a vida espiritual, indicando que a verdadeira pátria do espírito não é a Terra.'}
  ]},
  {cap:3,titulo:'Há muitas moradas na casa de meu Pai',itens:[
    {n:1,texto:'Na casa de meu Pai há muitas moradas; se assim não fosse, eu vo-lo teria dito, pois vou preparar-vos um lugar.'},
    {n:2,texto:'A casa do Pai é o Universo. As diferentes moradas são os mundos que circulam no espaço infinito e oferecem aos espíritos errantes estações apropriadas ao seu adiantamento.'},
    {n:3,texto:'A pluralidade dos mundos habitados é uma das grandes verdades reveladas pelo Espiritismo, confirmando as palavras de Jesus.'}
  ]},
  {cap:4,titulo:'Ninguém poderá ver o reino de Deus se não nascer de novo',itens:[
    {n:1,texto:'Em verdade vos digo: se alguém não nascer de novo, não poderá ver o reino de Deus.'},
    {n:2,texto:'A reencarnação é o princípio fundamental da doutrina espírita. A alma, criada simples e ignorante, progride através de existências sucessivas.'},
    {n:3,texto:'Nascer de novo é renascer em outro corpo. A alma já viveu e viverá ainda. Cada existência é um passo a mais na estrada do progresso.'}
  ]},
  {cap:5,titulo:'Bem-aventurados os aflitos',itens:[
    {n:1,texto:'Bem-aventurados os que choram, porque serão consolados.'},
    {n:2,texto:'As aflições da Terra são provas e expiações. Felizes os que as suportam com paciência, porque delas sairão purificados.'},
    {n:3,texto:'O sofrimento é ao mesmo tempo a consequência das faltas passadas e a escola onde o espírito aprende e se fortalece.'},
    {n:4,texto:'Jesus disse: Bem-aventurados os aflitos — não porque o sofrimento seja um bem em si, mas porque é o caminho necessário para a cura da alma.'}
  ]},
  {cap:6,titulo:'O Cristo Consolador',itens:[
    {n:1,texto:'Se me amais, guardai os meus mandamentos; e eu rogarei a meu Pai e Ele vos enviará outro Consolador, para que fique eternamente convosco.'},
    {n:2,texto:'O Espírito de Verdade é o grande Consolador prometido por Jesus. A sua vinda é o sinal da nova era para a humanidade.'},
    {n:3,texto:'O Espiritismo realiza o que Jesus anunciou do Consolador prometido: o conhecimento das coisas, fazendo que o homem saiba de onde vem, para onde vai, e por que está na Terra.'}
  ]},
  {cap:7,titulo:'Bem-aventurados os pobres de espírito',itens:[
    {n:1,texto:'Bem-aventurados os pobres de espírito, porque deles é o reino dos céus.'},
    {n:2,texto:'A pobreza de espírito não é a falta de inteligência, mas a humildade, o desprendimento das coisas materiais e a simplicidade do coração.'},
    {n:3,texto:'Aquele que se eleva será rebaixado e aquele que se rebaixa será elevado. A humildade é a virtude oposta ao orgulho.'},
    {n:4,texto:'O orgulho é a chaga da humanidade. É a fonte de quase todos os vícios e de quase todas as misérias. É ele que se deve combater antes de tudo.'}
  ]},
  {cap:8,titulo:'Bem-aventurados os que têm puro o coração',itens:[
    {n:1,texto:'Bem-aventurados os que têm puro o coração, porque verão a Deus.'},
    {n:2,texto:'A pureza do coração é inseparável da simplicidade e da humildade. Ela exclui todo pensamento de egoísmo e de orgulho.'},
    {n:3,texto:'Não é a boca que contamina o homem, mas o que sai da boca, isso sim, contamina o homem. Porque do coração procedem os maus pensamentos.'}
  ]},
  {cap:9,titulo:'Bem-aventurados os que são brandos e pacíficos',itens:[
    {n:1,texto:'Bem-aventurados os brandos, porque herdarão a Terra. Bem-aventurados os pacíficos, porque serão chamados filhos de Deus.'},
    {n:2,texto:'A brandura e a paciência são as duas companheiras da caridade. A brutalidade ofende a caridade tanto quanto o egoísmo.'},
    {n:3,texto:'O homem de bem prefere perdoar a vingar-se. Não reconhece inimigos senão no mal, e não adversários senão na injustiça.'},
    {n:4,texto:'A verdadeira coragem não está na violência, mas na capacidade de suportar com paciência e firmeza as provas da vida.'}
  ]},
  {cap:10,titulo:'Bem-aventurados os que são misericordiosos',itens:[
    {n:1,texto:'Bem-aventurados os misericordiosos, porque alcançarão misericórdia.'},
    {n:2,texto:'A misericórdia é o complemento da brandura e da caridade. Sem ela, não há indulgência para com os outros; ela predispõe à reconciliação.'},
    {n:3,texto:'Perdoai para que Deus vos perdoe; fazei o bem sem olhar a quem; fazei aos outros o que quereríeis que vos fizessem.'},
    {n:4,texto:'Quem é sem pecado que atire a primeira pedra. Jesus ensina a indulgência como lei de amor e de justiça.'}
  ]},
  {cap:11,titulo:'Amar o próximo como a si mesmo',itens:[
    {n:1,texto:'Amarás o teu próximo como a ti mesmo. Toda a lei e os profetas se encerram neste mandamento.'},
    {n:2,texto:'O dever de amar o próximo não se limita ao círculo dos amigos e parentes: estende-se a toda a humanidade.'},
    {n:3,texto:'Fazei aos homens tudo o que queirais que eles vos façam. Esta é a verdadeira regra de ouro da moral universal.'},
    {n:4,texto:'O verdadeiro amor ao próximo consiste em ser indulgente, generoso, misericordioso e dedicado, sem calcular a recompensa.'}
  ]},
  {cap:12,titulo:'Amai os vossos inimigos',itens:[
    {n:1,texto:'Eu vos digo: Amai os vossos inimigos; fazei bem aos que vos odeiam; orai pelos que vos perseguem e caluniam.'},
    {n:2,texto:'A vingança é um resquício dos costumes bárbaros. O homem que se vinga desce ao nível do seu adversário; aquele que perdoa, eleva-se acima dele.'},
    {n:3,texto:'Se amais apenas os que vos amam, que recompensa havereis? Até os publicanos fazem o mesmo. Amar os inimigos é a caridade em seu grau mais elevado.'},
    {n:4,texto:'A retaliação não é da lei de Deus. A verdadeira grandeza está em devolver o bem pelo mal e em perdoar sem limites.'}
  ]},
  {cap:13,titulo:'Que a mão esquerda não saiba o que faz a direita',itens:[
    {n:1,texto:'Guardai-vos de fazer as vossas boas obras diante dos homens para serdes vistos por eles; quando fizeres esmola, que a tua mão esquerda não saiba o que faz a tua direita.'},
    {n:2,texto:'A verdadeira caridade é modesta e se esconde. Ela pratica o bem pelo bem, sem ostentar, sem buscar elogios nem reconhecimento.'},
    {n:3,texto:'Os que fazem caridade por vaidade têm já a sua recompensa neste mundo; os que a praticam em segredo receberão do Pai que vê em segredo.'}
  ]},
  {cap:14,titulo:'Honrai vosso pai e vossa mãe',itens:[
    {n:1,texto:'Honra teu pai e tua mãe, a fim de que sejas feliz e tenhas longa vida sobre a terra.'},
    {n:2,texto:'Para Jesus, a palavra pai e mãe não se limita ao genitor do corpo. Deus é o Pai comum de todos os homens; os pais terrenos são mandatários Seus.'},
    {n:3,texto:'Os filhos devem respeito aos pais porque eles são os instrumentos da vida; os pais devem guiar os filhos com amor, sem prepotência.'},
    {n:4,texto:'Quem é minha mãe e quem são meus irmãos? Todo aquele que faz a vontade de meu Pai que está nos céus, esse é meu irmão, minha irmã e minha mãe.'}
  ]},
  {cap:15,titulo:'Fora da caridade não há salvação',itens:[
    {n:1,texto:'Fora da caridade não há salvação. Este é o princípio fundamental que liga todos os homens a Deus e entre si.'},
    {n:2,texto:'Todo homem que pratica a justiça, a bondade e o amor está no caminho da salvação, qualquer que seja o culto que professe.'},
    {n:3,texto:'A caridade, tal como a entendia Jesus, compreende todas as virtudes: é a benevolência para com todos, a indulgência para com as fraquezas dos outros.'},
    {n:4,texto:'Cada um será julgado segundo as suas obras. As obras são a prática do amor, da justiça e da caridade — não a crença cega nem as fórmulas.'}
  ]},
  {cap:16,titulo:'Não se pode servir a Deus e a Mamon',itens:[
    {n:1,texto:'Ninguém pode servir a dois senhores: ou odiará a um e amará o outro. Não podeis servir a Deus e a Mamon.'},
    {n:2,texto:'Não acumuleis tesouros na Terra, onde a ferrugem e a traça os consomem. Acumulai tesouros no céu.'},
    {n:3,texto:'O apego aos bens da Terra é um dos maiores obstáculos ao progresso moral. O desprendimento não é a miséria, mas o uso justo e generoso do que se possui.'},

// ── PODCAST (Web Speech API) ──
var evPodcastPlaying=false;
function toggleEvPodcast(){
  if(evPodcastPlaying){speechSynthesis.cancel();evPodcastPlaying=false;updateEvPodcastBtn();return;}
  var main=document.getElementById('main');
  if(!main||!main.textContent.trim()) return;
  if(!('speechSynthesis' in window)){alert('Navegador não suporta leitura em voz.');return;}

  var text=main.textContent;
  var voices=speechSynthesis.getVoices();
  var savedURI=localStorage.getItem('spirit_voice_uri')||'';
  var voice=savedURI?voices.find(function(v){return v.voiceURI===savedURI;}):null;
  if(!voice) voice=voices.find(function(v){return v.lang.startsWith('pt');});
  var rate=parseFloat(localStorage.getItem('spirit_voice_rate')||'0.9');
  var pitch=parseFloat(localStorage.getItem('spirit_voice_pitch')||'1');

  var utt=new SpeechSynthesisUtterance(text);
  utt.lang='pt-BR';utt.rate=rate;utt.pitch=pitch;utt.volume=1;
  if(voice) utt.voice=voice;
  utt.onstart=function(){evPodcastPlaying=true;updateEvPodcastBtn();};
  utt.onend=function(){evPodcastPlaying=false;updateEvPodcastBtn();};
  utt.onerror=function(){evPodcastPlaying=false;updateEvPodcastBtn();};
  speechSynthesis.speak(utt);
}
function updateEvPodcastBtn(){
  var btn=document.getElementById('ev-podcast-btn');
  if(!btn)return;
  btn.textContent=evPodcastPlaying?'⏹':'🎧';
  btn.style.color=evPodcastPlaying?'var(--gold)':'rgba(240,234,214,.5)';
}

var _chimesAudio=null;

// Pré-carregar para tocar instantâneo
var _chimesPreloaded=new Audio('meditation-home-gospel.mp3');
_chimesPreloaded.preload='auto';

function startWindChimes(){
  try{
    _chimesAudio=_chimesPreloaded.cloneNode();
    _chimesAudio.loop=true;
    _chimesAudio.volume=1;
    _chimesAudio.currentTime=0;
    _chimesAudio.play().catch(function(){});
  }catch(e){console.warn('Wind chimes error:',e);}
}

function stopWindChimes(){
  if(_chimesAudio){_chimesAudio.pause();_chimesAudio.currentTime=0;_chimesAudio=null;}
}

function stopJesusMusic(){
  if(window._jesusMusic){window._jesusMusic.pause();window._jesusMusic=null;}
}

function voltarEtapa(){
  var fases=['config','facilitador','prece1','leitura','comentarios','vibracoes','prece2','fim'];
  var idx=fases.indexOf(fase);
  if(idx<=0){
    window.location.href='app.html';
  } else {
    if(timerInterval){clearInterval(timerInterval);timerInterval=null;}
    if(fase==='prece1'||fase==='prece2'){stopPreceMusic();stopPaiNosso();}
    if(fase==='vibracoes') stopWindChimes();
    fase=fases[idx-1];
    renderFase();
  }
}

var DAY_NAMES={dom:'Dom',seg:'Seg',ter:'Ter',qua:'Qua',qui:'Qui',sex:'Sex',sab:'Sáb'};
var DAY_FULL={dom:'Domingo',seg:'Segunda',ter:'Terça',qua:'Quarta',qui:'Quinta',sex:'Sexta',sab:'Sábado'};

function renderDayButtons(){
  if(!config.dias) config.dias=[];
  var days=['dom','seg','ter','qua','qui','sex','sab'];
  return days.map(function(d){
    var active=config.dias.indexOf(d)>=0;
    return '<div class="cfg-opt'+(active?' active':'')+'" onclick="toggleEvDay(\''+d+'\')" style="min-width:42px;padding:8px 6px;font-size:12px">'+DAY_NAMES[d]+'</div>';
  }).join('');
}

function toggleEvDay(day){
  if(!config.dias) config.dias=[];
  var idx=config.dias.indexOf(day);
  if(idx>=0) config.dias.splice(idx,1);
  else config.dias.push(day);
  localStorage.setItem('spirit_evangelho_config',JSON.stringify(config));
  document.getElementById('main').innerHTML=renderConfig();
}

function toggleLembrete(){
  config.lembrete=!config.lembrete;
  localStorage.setItem('spirit_evangelho_config',JSON.stringify(config));
  document.getElementById('main').innerHTML=renderConfig();
  // Tentar ativar notificações push se lembrete ativo
  if(config.lembrete&&'Notification' in window&&Notification.permission==='default'){
    Notification.requestPermission();
  }
}

function calcProximaSessao(){
  if(!config.dias||config.dias.length===0) return '';
  var dayMap={dom:0,seg:1,ter:2,qua:3,qui:4,sex:5,sab:6};
  var dayNums=config.dias.map(function(d){return dayMap[d];});
  var now=new Date();
  var hora=(config.horario||'19:30').split(':');
  for(var i=0;i<7;i++){
    var check=new Date(now);
    check.setDate(check.getDate()+i);
    if(dayNums.indexOf(check.getDay())>=0){
      check.setHours(parseInt(hora[0]),parseInt(hora[1]),0);
      if(check>now){
        return DAY_FULL[config.dias.find(function(d){return dayMap[d]===check.getDay();})]||''+' às '+(config.horario||'19:30')+' ('+check.toLocaleDateString('pt-BR',{day:'2-digit',month:'short'})+')';
      }
    }
  }
  return DAY_FULL[config.dias[0]]+' às '+(config.horario||'19:30');
}

// ── SELEÇÃO DE CAPÍTULO (índice visual) ──
function selectCap(n){
  // Efeito zoom no card selecionado
  var el=document.getElementById('cap-'+n);
  if(el) el.classList.add('zooming');
  // Após zoom, mostrar leitura com efeito de abertura de página
  setTimeout(function(){
    var cap=PASSAGENS.find(function(p){return p.cap===n;});
    if(cap){
      // Se é o capítulo atual, usar o item salvo no progresso
      var itemIdx=0;
      if(n===trechoAtual.cap && trechoAtual.item){
        var savedItem=cap.itens.find(function(i){return i.n===trechoAtual.item;});
        if(savedItem) itemIdx=cap.itens.indexOf(savedItem);
      }
      var item=cap.itens[itemIdx];
      trechoAtual={cap:cap.cap,item:item.n,titulo:cap.titulo,texto:item.texto};
    } else {
      var titulo=CAPITULOS.find(function(c){return c.n===n;});
      trechoAtual={cap:n,item:1,titulo:titulo?titulo.t:'Capítulo '+n,texto:'Conteúdo deste capítulo será gerado pelo facilitador durante os comentários.'};
    }
    var m=document.getElementById('main');
    m.innerHTML='<div class="page-opening">'+renderLeitura()+'</div>';
    document.getElementById('controls').innerHTML='<button class="btn-g" onclick="avancar()">Li a passagem</button>';
  },600);
}

// ── SELEÇÃO DE TRECHO ──
function selecionarTrecho(random){
  if(config.modo==='aleatorio'||random){
    var cap=PASSAGENS[Math.floor(Math.random()*PASSAGENS.length)];
    var item=cap.itens[Math.floor(Math.random()*cap.itens.length)];
    trechoAtual={cap:cap.cap,item:item.n,titulo:cap.titulo,texto:item.texto};
  } else {
    // Sequencial
    var cap=PASSAGENS.find(function(p){return p.cap===trechoAtual.cap;});
    if(!cap){cap=PASSAGENS[0];trechoAtual.cap=cap.cap;trechoAtual.item=1;}
    var item=cap.itens.find(function(i){return i.n===trechoAtual.item;});
    if(!item){item=cap.itens[0];trechoAtual.item=item.n;}
    trechoAtual.titulo=cap.titulo;
    trechoAtual.texto=item.texto;
  }
}

// ── MÚSICA DE PRECE ──
var _preceAudio=null;
function startPreceMusic(){
  stopPreceMusic();
  if(_previewAudio){_previewAudio.pause();_previewAudio=null;}
  var file=config.musica||'splash-music.mp3';
  _preceAudio=new Audio(file);
  _preceAudio.volume=0;
  _preceAudio.loop=true;
  _preceAudio.play().catch(function(){});
  // Fade in suave
  var vol=0;
  var fadeIn=setInterval(function(){
    vol+=0.02;
    if(vol>=0.5){vol=0.5;clearInterval(fadeIn);}
    if(_preceAudio) _preceAudio.volume=vol;
  },100);
}
function stopPreceMusic(){
  if(!_preceAudio) return;
  // Fade out suave
  var fadeOut=setInterval(function(){
    if(!_preceAudio){clearInterval(fadeOut);return;}
    _preceAudio.volume=Math.max(0,_preceAudio.volume-0.02);
    if(_preceAudio.volume<=0.01){
      _preceAudio.pause();_preceAudio.currentTime=0;_preceAudio=null;
      clearInterval(fadeOut);
    }
  },80);
}

  }
}

function adjustVibTime(delta){
  vibMins=Math.max(1,Math.min(5,vibMins+delta));
  var el=document.getElementById('vib-time-display');
  if(el) el.textContent=vibMins+' min';
  // Reiniciar timer com novo tempo
  if(timerInterval){clearInterval(timerInterval);timerInterval=null;}
  iniciarTimer(vibMins*60);
  document.getElementById('timer-display').textContent=String(vibMins).padStart(2,'0')+':00';
}

function changeChimesVol(delta){
  if(!_chimesAudio) return;
  _chimesAudio.volume=Math.max(0,Math.min(1,_chimesAudio.volume+delta));
  var el=document.getElementById('vol-display');
  if(el) el.textContent=Math.round(_chimesAudio.volume*100)+'%';
}

var _fadeStarted=false;
function iniciarTimer(secs){
  var remaining=secs;
  _fadeStarted=false;
  updateTimerDisplay(remaining);
  timerInterval=setInterval(function(){
    remaining--;
    if(remaining<=0){clearInterval(timerInterval);timerInterval=null;avancar();return;}
    // Fade out wind chimes 10s antes de acabar
    if(remaining<=10&&!_fadeStarted&&_chimesAudio){
      _fadeStarted=true;
      var fadeInt=setInterval(function(){
        if(!_chimesAudio){clearInterval(fadeInt);return;}
        _chimesAudio.volume=Math.max(0,_chimesAudio.volume-0.05);
        if(_chimesAudio.volume<=0.01){clearInterval(fadeInt);}
      },500);
    }
    updateTimerDisplay(remaining);
  },1000);
}

function updateTimerDisplay(s){
  var m=Math.floor(s/60);var sec=s%60;
  var el=document.getElementById('timer-display');
  if(el) el.textContent=String(m).padStart(2,'0')+':'+String(sec).padStart(2,'0');
}

function salvarProgresso(){
  // Avançar progresso sequencial
  var cap=PASSAGENS.find(function(p){return p.cap===trechoAtual.cap;});
  if(cap){
    var nextItem=trechoAtual.item+1;
    if(nextItem>cap.itens.length){
      var capIdx=PASSAGENS.indexOf(cap);
      if(capIdx<PASSAGENS.length-1){trechoAtual.cap=PASSAGENS[capIdx+1].cap;trechoAtual.item=1;}
      else{trechoAtual.cap=1;trechoAtual.item=1;}
    } else {trechoAtual.item=nextItem;}
  }
  // Salvar localStorage (sincronizar ambas chaves)
  var progData={cap:trechoAtual.cap,item:trechoAtual.item,config:config,lastSession:new Date().toISOString()};
  localStorage.setItem('spirit_evangelho_prog',JSON.stringify(progData));
  localStorage.setItem('spirit_evang_cap',trechoAtual.cap);
  localStorage.setItem('spirit_evangelho_config',JSON.stringify(config));
  // Salvar no banco Supabase
  salvarProgressoBanco(progData);
}

async function salvarProgressoBanco(progData){
  try{
    if(!window._evSb) return;
    var sess=await window._evSb.auth.getSession();
    if(!sess.data?.session) return;
    var uid=sess.data.session.user.id;
    await window._evSb.from('user_usage').update({
      evangelho_progress:progData
    }).eq('id',uid);
  }catch(e){console.warn('Evangelho save error:',e);}
}

async function carregarProgressoBanco(){
  try{
    if(!window._evSb) return;
    var sess=await window._evSb.auth.getSession();
    if(!sess.data?.session) return;
    var uid=sess.data.session.user.id;
    var r=await window._evSb.from('user_usage').select('evangelho_progress').eq('id',uid).maybeSingle();
    if(r.data&&r.data.evangelho_progress){
      var prog=r.data.evangelho_progress;
      trechoAtual.cap=prog.cap||1;
      trechoAtual.item=prog.item||1;
      if(prog.config){for(var k in prog.config) config[k]=prog.config[k];}
      localStorage.setItem('spirit_evangelho_prog',JSON.stringify(prog));
      localStorage.setItem('spirit_evangelho_config',JSON.stringify(config));
      renderFase();
    }
  }catch(e){console.warn('Evangelho load error:',e);}
}

// ── MICROFONE (Speech Recognition) ──
var _evVoiceRec=null, _evRecording=false;

function toggleEvVoice(){
  if(!('webkitSpeechRecognition' in window)&&!('SpeechRecognition' in window)){
    alert('Seu navegador não suporta reconhecimento de voz. Use Chrome, Edge ou Safari.');
    return;
  }
  if(_evRecording){ stopEvVoice(); return; }
  startEvVoice();
}

function startEvVoice(){
  var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  _evVoiceRec=new SR();
  _evVoiceRec.lang='pt-BR';
  _evVoiceRec.continuous=true;
  _evVoiceRec.interimResults=true;

  var inp=document.getElementById('qa-inp');
  var btn=document.getElementById('qa-mic-btn');
  var finalText=inp.value;

  _evVoiceRec.onstart=function(){
    _evRecording=true;
    btn.classList.add('recording');
    btn.textContent='⏹';
    inp.placeholder='Estou ouvindo...';
  };

  _evVoiceRec.onresult=function(e){
    var interim='',final='';
    for(var i=e.resultIndex;i<e.results.length;i++){
      if(e.results[i].isFinal) final+=e.results[i][0].transcript;
      else interim+=e.results[i][0].transcript;
    }
    if(final) finalText+=(finalText?' ':'')+final;
    inp.value=finalText+(interim?(' '+interim):'');
    inp.style.height='auto';
    inp.style.height=Math.min(inp.scrollHeight,120)+'px';
  };

  _evVoiceRec.onerror=function(e){
    if(e.error==='not-allowed'||e.error==='permission-denied'){
      alert('Permissão de microfone negada. Toque no cadeado (🔒) ao lado da URL e habilite o microfone.');
    } else if(e.error!=='no-speech'){
      alert('Erro no microfone: '+e.error);
    }
    stopEvVoice();
  };

  _evVoiceRec.onend=function(){
    if(_evRecording){ try{_evVoiceRec.start();}catch(ex){stopEvVoice();} }
  };

  try{ _evVoiceRec.start(); }catch(ex){ alert('Erro ao iniciar o microfone.'); }
}

function stopEvVoice(){
  _evRecording=false;
  var btn=document.getElementById('qa-mic-btn');
  if(btn){ btn.classList.remove('recording'); btn.textContent='🎙'; }
  var inp=document.getElementById('qa-inp');
  if(inp) inp.placeholder='Compartilhe sua reflexão...';
  if(_evVoiceRec){ try{_evVoiceRec.stop();}catch(ex){} _evVoiceRec=null; }
}
